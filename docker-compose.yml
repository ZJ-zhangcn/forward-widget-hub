services:
  forward-widget-hub:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      - SITE_URL=http://localhost:3000
      # Optional: public collection slugs rendered on the homepage, comma-separated.
      - PUBLIC_COLLECTION_SLUGS=r9Bh1TOUzm
      # Optional: protect upload/manage pages with a password.
      # - ACCESS_PASSWORD=change-me
      # Optional: single-user private mode. After password login on any device,
      # the UI uses this fixed owner token to show the same collections.
      # Generate with: python3 -c "import secrets; print('fwt_' + secrets.token_urlsafe(32))"
      # - SINGLE_USER_MODE=true
      # - OWNER_TOKEN=fwt_replace_with_a_long_random_value
      # Optional: /admin dashboard password.
      # - ADMIN_PASSWORD=change-me-too
    restart: unless-stopped
