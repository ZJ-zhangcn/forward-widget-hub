name: Docker Image & Netcup Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: forward-widget-hub-docker-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zj-zhangcn/forward-widget-hub

jobs:
  docker:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=branch

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-netcup:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on Netcup VPS if SSH secrets are configured
        env:
          NETCUP_HOST: ${{ secrets.NETCUP_HOST }}
          NETCUP_PORT: ${{ secrets.NETCUP_PORT }}
          NETCUP_USER: ${{ secrets.NETCUP_USER }}
          NETCUP_SSH_KEY: ${{ secrets.NETCUP_SSH_KEY }}
          IMAGE: ghcr.io/zj-zhangcn/forward-widget-hub:latest
        run: |
          set -euo pipefail
          if [ -z "${NETCUP_HOST:-}" ] || [ -z "${NETCUP_USER:-}" ] || [ -z "${NETCUP_SSH_KEY:-}" ]; then
            echo "::notice::Skipping Netcup deploy — set NETCUP_HOST, NETCUP_USER, NETCUP_SSH_KEY and optional NETCUP_PORT secrets."
            exit 0
          fi
          PORT="${NETCUP_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$NETCUP_SSH_KEY" > ~/.ssh/netcup_key
          chmod 600 ~/.ssh/netcup_key
          ssh-keyscan -p "$PORT" "$NETCUP_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/netcup_key -p "$PORT" "$NETCUP_USER@$NETCUP_HOST" \
            "cd /root/forward-widget-hub && docker compose pull forward-widget-hub && docker compose up -d --remove-orphans forward-widget-hub && docker image prune -f"
